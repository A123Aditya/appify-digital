<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A00E0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8E2DE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C6FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#logoGradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- Main circle with gradient -->
  <circle cx="100" cy="100" r="80" fill="url(#logoGradient)" opacity="0.9"/>
  
  <!-- Inner glow circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
  
  <!-- Letter A in the center -->
  <g transform="translate(100, 100)">
    <!-- Left stroke of A -->
    <line x1="-18" y1="10" x2="0" y2="-25" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Right stroke of A -->
    <line x1="18" y1="10" x2="0" y2="-25" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Horizontal bar of A -->
    <line x1="-12" y1="-5" x2="12" y2="-5" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="140" cy="70" r="4" fill="url(#logoGradient)" opacity="0.8"/>
  <circle cx="60" cy="130" r="4" fill="url(#logoGradient)" opacity="0.8"/>
  <circle cx="150" cy="145" r="3" fill="url(#logoGradient)" opacity="0.6"/>
</svg>
